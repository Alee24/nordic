version: '3.8'

services:
  # MySQL Service (Legacy/Ref, kept for safety but not used)
  # db:
  #   image: mysql:8.0
  #   ...

  db:
    image: mysql:8.0
    container_name: nordic_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: nordic_root_password
      MYSQL_DATABASE: nordic_db
      MYSQL_USER: nordic_user
      MYSQL_PASSWORD: nordic_password
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./server
    container_name: nordic_backend
    restart: always
    ports:
      - "8123:8123"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      DATABASE_URL: "mysql://nordic_user:nordic_password@db:3306/nordic_db"
      PORT: 8123
      JWT_SECRET: "nordic_secret_key_change_me"
    depends_on:
      - db

  frontend:
    build:
      context: .
    container_name: nordic_frontend
    restart: always
    ports:
      - "8124:8124"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      - ./package.json:/app/package.json
    environment:
      - VITE_API_URL=http://localhost:8123/api

volumes:
  mysql_data:
